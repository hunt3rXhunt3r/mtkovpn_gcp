server {
    listen 8080;

    location / {
        # Dito itutuloy ang traffic sa iyong sariling server
        # Siguraduhin na ang OpenVPN/WS mo sa VPS ay naka-TCP port 1194 o kung ano man ang gamit mo
        proxy_pass http://TARGET_IP:1194; 

        # WebSocket Support (Importante para sa SSLWS)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers para hindi mawala ang original IP ng user
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings para sa VPN connection
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
