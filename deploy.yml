name: Deploy to Cloud Run
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Inject Server IP
        # Hahanapin ang dead IP (167.172.69.123) at papalitan ng nasa Secrets
        run: |
          sed -i "s/167.172.69.123/${{ secrets.MY_SERVER_IP }}/g" nginx.conf

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build and Push
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/vpn-proxy .
          gcloud auth configure-docker --quiet
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/vpn-proxy

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy vpn-dns-service \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/vpn-proxy \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated
