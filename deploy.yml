name: Deploy to Cloud Run
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Auth Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Build and Push to Artifact Registry
        run: |
          # Dito ini-inject ang IP mula sa GitHub Secrets patungo sa Docker
          docker build --build-arg SERVER_IP=${{ secrets.MY_SERVER_IP }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/vpn-proxy .
          gcloud auth configure-docker
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/vpn-proxy

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy vpn-dns-service \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/vpn-proxy \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated
